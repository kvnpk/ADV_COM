<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>University Course Manager - Login</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 60px; text-align: center; }
        h1 { color: #1a73e8; font-size: 2.5rem; margin-bottom: 10px; }
        .container { display: flex; justify-content: center; gap: 30px; margin-top: 30px; }
        

        .card { 
            background: white; padding: 40px; border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 250px;
            cursor: pointer; transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }
        .card h2 { color: #1a73e8; margin-top: 0; }
        .card p { font-size: 0.9rem; color: #555; }

        .login-panel { 
            background: white; padding: 30px; border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: left; margin: 0 auto;
            display: none;
            margin-top: 30px;
        }
        input, button.submit-btn { width: 100%; padding: 10px; margin-top: 10px; box-sizing: border-box; }
        button.submit-btn { background: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
        
        .back-link { display: inline-block; margin-bottom: 15px; color: #1a73e8; cursor: pointer; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }

        .footer-link { margin-top: 40px; display: block; color: #555; text-decoration: none; }
        .footer-link:hover { color: #1a73e8; text-decoration: underline; }
    </style>
</head>
<body>
    <h1>University Course Manager</h1>
    <p id="subtitle">Please select your role to log in.</p>

    <div id="roleSelection" class="container">
        <div class="card" onclick="showLogin('Student')">
            <h2>Student</h2>
            <p>Log in to enroll in courses.</p>
        </div>
        <div class="card" onclick="showLogin('Professor')">
            <h2>Professor</h2>
            <p>Log in to manage grades.</p>
        </div>
    </div>

    <div id="studentLogin" class="login-panel">
        <span class="back-link" onclick="goBack()">← Back to Roles</span>
        <h2 style="margin-top:0; color:#1a73e8;">Student Login</h2>
        <label>Student ID:</label>
        <input type="text" id="studentIdLogin" placeholder="Enter your ID">
        <button class="submit-btn" onclick="login('Student')">Log In</button>
    </div>

    <div id="professorLogin" class="login-panel">
        <span class="back-link" onclick="goBack()">← Back to Roles</span>
        <h2 style="margin-top:0; color:#1a73e8;">Professor Login</h2>
        <label>Employee ID:</label>
        <input type="text" id="profIdLogin" placeholder="Enter your ID">
        <button class="submit-btn" onclick="login('Professor')">Log In</button>
    </div>

    <a href="/register.html" class="footer-link">Registrar Office: Create New Users</a>

    <script>
        function showLogin(role) {
            document.getElementById('roleSelection').style.display = 'none';
            document.getElementById('subtitle').innerText = "Enter your credentials.";
            
            if (role === 'Student') {
                document.getElementById('studentLogin').style.display = 'block';
            } else {
                document.getElementById('professorLogin').style.display = 'block';
            }
        }

        function goBack() {
            document.getElementById('studentLogin').style.display = 'none';
            document.getElementById('professorLogin').style.display = 'none';
            
            document.getElementById('roleSelection').style.display = 'flex';
            document.getElementById('subtitle').innerText = "Please select your role to log in.";
        }

        function login(role) {
            const idInput = role === 'Student' ? 'studentIdLogin' : 'profIdLogin';
            const endpoint = role === 'Student' ? '/api/loginStudent' : '/api/loginProfessor';
            const id = document.getElementById(idInput).value;

            if (!id) { alert("Please enter an ID."); return; }

            fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ id: id })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    sessionStorage.setItem("loggedInId", id);
                    sessionStorage.setItem("loggedInName", data.name);
                    sessionStorage.setItem("role", role);
                    window.location.href = role === 'Student' ? '/student.html' : '/professor.html';
                } else {
                    alert(role + " ID not found. Please try again or create an account via the Registrar Office.");
                }
            });
        }
    </script>
</body>
</html>
